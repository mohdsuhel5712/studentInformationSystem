<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>View Students</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

 <style>
    /* Gradient Navbar */
    .navbar-gradient {
      background: linear-gradient(90deg, #6a11cb 0%, #2575fc 100%);
    }

    .navbar-gradient .nav-link, .navbar-brand {
      color: #fff !important;
      font-weight: 500;
      transition: all 0.3s ease-in-out;
    }

    .navbar-gradient .nav-link:hover {
      color: #ffe600 !important;
      transform: scale(1.05);
    }

    .navbar-brand {
      font-size: 1.5rem;
      font-weight: bold;
    }

    /* Active link highlight */
    .nav-link.active {
      color: #ffe600 !important;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <!-- 🌈 Beautiful Gradient Navbar -->
  <nav class="navbar navbar-expand-lg navbar-gradient shadow-sm">
    <div class="container">
      <a class="navbar-brand" href="/">🎓 Student InfoSys</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link active" href="/">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="/view">View Students</a></li>
          <li class="nav-item"><a class="nav-link" href="/update/1">Update Student</a></li>
          <li class="nav-item"><a class="nav-link" href="/delete/1">Delete Student</a></li>
          <li class="nav-item"><a class="nav-link" href="https://getbootstrap.com/" target="_blank">Help</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Students Table -->
  <div class="container my-5">
    <h3 class="text-center text-primary mb-4">Student List</h3>
    <table class="table table-bordered table-hover text-center">
      <thead class="table-primary">
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Email</th>
          <th>Course</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        {% for s in students %}
        <tr>
          <td>{{ s[0] }}</td>
          <td>{{ s[1] }}</td>
          <td>{{ s[2] }}</td>
          <td>{{ s[3] }}</td>
          <td>
            <a href="/update/{{ s[0] }}" class="btn btn-warning btn-sm">Edit</a>
            <a href="/delete/{{ s[0] }}" class="btn btn-danger btn-sm">Delete</a>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>

</body>
</html>
