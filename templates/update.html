<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Update Student</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
    /* Gradient Navbar */
    .navbar-gradient {
      background: linear-gradient(90deg, #6a11cb 0%, #2575fc 100%);
    }

    .navbar-gradient .nav-link, .navbar-brand {
      color: #fff !important;
      font-weight: 500;
      transition: all 0.3s ease-in-out;
    }

    .navbar-gradient .nav-link:hover {
      color: #ffe600 !important;
      transform: scale(1.05);
    }

    .navbar-brand {
      font-size: 1.5rem;
      font-weight: bold;
    }

    /* Active link highlight */
    .nav-link.active {
      color: #ffe600 !important;
      font-weight: 600;
    }
  </style>
</head>
<body>
<!-- 🌈 Beautiful Gradient Navbar -->
  <nav class="navbar navbar-expand-lg navbar-gradient shadow-sm">
    <div class="container">
      <a class="navbar-brand" href="/">🎓 Student InfoSys</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link active" href="/">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="/view">View Students</a></li>
          <li class="nav-item"><a class="nav-link" href="/update/1">Update Student</a></li>
          <li class="nav-item"><a class="nav-link" href="/delete/1">Delete Student</a></li>
          <li class="nav-item"><a class="nav-link" href="https://getbootstrap.com/" target="_blank">Help</a></li>
        </ul>
      </div>
    </div>
  </nav>
  <!-- Update Form -->
  <div class="container my-5">
    <div class="card shadow-lg p-4">
      <h3 class="text-center text-primary mb-4">Update Student Info</h3>
      <form method="POST">
        <div class="mb-3">
          <label class="form-label">Full Name</label>
          <input type="text" class="form-control" name="name" value="{{ student[1] }}" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" name="email" value="{{ student[2] }}" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Course</label>
          <input type="text" class="form-control" name="course" value="{{ student[3] }}" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Update Student</button>
      </form>
    </div>
  </div>

</body>
</html>
